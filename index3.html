<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lógica com JavaScript</title>
</head>
<body>

<script>
    let nome = "";
    let sobre = "";

    while (nome == "")
    {
        nome = prompt("Digite seu nome");
        if (nome == "")
        {
            alert("Digite algo");
        }
    }

    while (sobre == "")
    {
        sobre = prompt("Digite seu sobrenome");
        if (sobre == "")
        {
            alert("Digite algo");
        }
    }
</script>

</body>
</html>
