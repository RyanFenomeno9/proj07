<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lógica com JavaScript</title>
</head>
<body>

<script>
    let saldo = 10000;
    let valor;

    while (valor > saldo)
    {
        valor = Number(prompt(`Digite o valor que deseja sacar. Seu saldo é: ${saldo}`));
        if(valor < saldo)
        {
            saldo = saldo - valor;
        }

        else 
        {
            alert("Você não tem saldo o suficiente");
        }
    }
</script>

</body>
</html>
